<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Dashboard Grid Icon -->
  <rect x="15" y="15" width="30" height="25" rx="4" fill="white" opacity="0.9"/>
  <rect x="55" y="15" width="30" height="25" rx="4" fill="white" opacity="0.9"/>
  <rect x="15" y="50" width="30" height="35" rx="4" fill="white" opacity="0.9"/>
  <rect x="55" y="50" width="30" height="35" rx="4" fill="white" opacity="0.9"/>
  
  <!-- Small accent dots -->
  <circle cx="30" cy="27" r="3" fill="#3b82f6"/>
  <circle cx="70" cy="27" r="3" fill="#8b5cf6"/>
  <circle cx="30" cy="67" r="3" fill="#8b5cf6"/>
  <circle cx="70" cy="67" r="3" fill="#3b82f6"/>
</svg>
