  <style>
    @keyframes button-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .animate-button-pulse {
      animation: button-pulse 1.5s ease-in-out infinite;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .animate-fade-in-scale {
      animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-in {
      animation: slideIn 0.8s ease-out forwards;
      opacity: 0;
      /* Start invisible */
    }

    .neon-effect-purple {
      box-shadow: 0 0 7px #a855f7, 0 0 15px #c084fc;
    }

    .neon-effect-yellow {
      box-shadow: 0 0 7px #f59e0b, 0 0 15px #fbbf24;
    }

    .neon-effect-red {
      box-shadow: 0 0 8px #ef4444, 0 0 18px #f87171;
    }

    .neon-effect-green {
      box-shadow: 0 0 8px #22c55e, 0 0 18px #4ade80;
    }

    .neon-outline-purple {
      position: relative;
      z-index: 10;
      box-shadow: 0 0 3px #c084fc, 0 0 6px #a855f7;
    }

    body {
      background-color: #f8fafc;
      /* neutral light bg */
      background-image: radial-gradient(circle at 1% 1%, rgba(219, 234, 254, 0.5) 0%, transparent 35%),
        radial-gradient(circle at 99% 99%, rgba(221, 214, 254, 0.6) 0%, transparent 35%);
      background-attachment: fixed;
      transition: background-color 0.3s ease;
    }

    html.dark body {
      background-color: #111827;
      /* gray-900 */
      background-image: radial-gradient(circle at 1% 1%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 99% 99%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
    }

    /* Custom Scrollbar for Light/Dark Theme */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      /* slate-100 */
    }

    html.dark ::-webkit-scrollbar-track {
      background: #1e293b;
      /* slate-800 */
    }

    ::-webkit-scrollbar-thumb {
      background-color: #94a3b8;
      /* slate-400 */
      border-radius: 10px;
      border: 3px solid #f1f5f9;
      /* slate-100 */
    }

    html.dark ::-webkit-scrollbar-thumb {
      background-color: #475569;
      /* slate-600 */
      border-color: #1e293b;
      /* slate-800 */
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #64748b;
      /* slate-500 */
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background-color: #334155;
      /* slate-700 */
    }

    /* Print specific styles */
    @media print {

      header,
      /* App Header */
      main>div:first-child,
      /* ViewSwitcher container */
      .no-print {
        display: none !important;
      }

      body {
        background-image: none;
      }

      /* Ensure only the desired grid area is visible for printing */
      body * {
        visibility: hidden;
      }

      .printing-all-grids,
      .printing-all-grids * {
        visibility: visible;
      }

      .printing-all-grids {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .grid-print-item {
        page-break-inside: avoid;
      }
    }

    /* Hide number input arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      /* Firefox */
    }

    /* Animated Progress Bar */
    @keyframes progress-animation {
      0% {
        background-position: 1rem 0;
      }

      100% {
        background-position: 0 0;
      }
    }

    .progress-bar-animated {
      background-image: linear-gradient(45deg, rgba(255, 255, 255, .15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, .15) 75%, transparent 75%, transparent);
      background-size: 1rem 1rem;
      animation: progress-animation 1s linear infinite;
    }
  </style>
